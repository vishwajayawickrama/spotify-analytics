name: Deploy Frontend to GitHub Pages

env:
  # TODO: Move this to a GitHub Actions variable/secret (for example vars.BACKEND_BASE_URL).
  BACKEND_BASE_URL: https://ec58c6af-699d-47f9-b160-e155e9dd5fed-dev.e1-us-east-azure.choreoapis.dev/spotify-analytics/spotifyintegration/v1.0

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/deploy-frontend-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_BACKEND_BASE: ${{ env.BACKEND_BASE_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
